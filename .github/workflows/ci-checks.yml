name: .NET Build and Security Scan

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: self-hosted

    steps:

    # 1️⃣ Checkout code
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2️⃣ Setup Java automatically
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    # 3️⃣ Restore NuGet packages
    - name: Restore NuGet
      run: nuget restore SampleDotNetFrameworkApp.slnx

    # 4️⃣ Build using MSBuild
    - name: Build solution
      run: msbuild SampleDotNetFrameworkApp.slnx /t:Rebuild

    # 5️⃣ Run OWASP Dependency Check (auto download)
    - name: Run Dependency Check
      uses: dependency-check/Dependency-Check_Action@main
      with:
        project: "SampleDotNetFrameworkApp"
        path: "."
        format: "HTML"

    # 6️⃣ Upload report
    - name: Upload report
      uses: actions/upload-artifact@v4
      with:
        name: dependency-check-report
        path: reports
