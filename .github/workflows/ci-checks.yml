name: CI Checks

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:
jobs:
  code-checks:
    runs-on: [self-hosted, windows]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # ------------------------
      # Security Scan with OWASP Dependency-Check
      # ------------------------
      - name: Install OWASP Dependency-Check (if missing)
        shell: pwsh
        run: |
          choco list --local-only dependency-check | Select-String "dependency-check" || choco install dependency-check -y

      - name: Run Dependency-Check
        run: |
          dependency-check --project "SampleDotNetFrameworkApp" \
                           --scan . \
                           --format HTML \
                           --out dependency-check-report.html

      - name: Upload Dependency-Check Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: dependency-check-report.html

      # ------------------------
      # Static Code Analysis
      # ------------------------
      - name: Restore NuGet Packages
        shell: pwsh
        run: |
          choco list --local-only nuget.commandline | Select-String "nuget.commandline" || choco install nuget.commandline -y
          nuget restore SampleDotNetFrameworkApp.slnx

      - name: Build with Analyzers
        run: msbuild SampleDotNetFrameworkApp.slnx /t:Rebuild /p:RunCodeAnalysis=true

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: SampleDotnetFrameworkApp/bin/
