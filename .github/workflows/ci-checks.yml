name: CI Checks

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  code-checks:
    runs-on: [self-hosted, windows]

    steps:
      # ------------------------
      # 1️⃣ Checkout code
      # ------------------------
      - name: Checkout code
        uses: actions/checkout@v3

      # ------------------------
      # 2️⃣ Restore NuGet Packages
      # ------------------------
      - name: Restore NuGet Packages
        shell: powershell
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          nuget restore SampleDotNetFrameworkApp.slnx

      # ------------------------
      # 3️⃣ Build with Analyzers (StyleCop / FxCop)
      # ------------------------
      - name: Build with Analyzers
        shell: powershell
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          & "C:\Program Files\Microsoft Visual Studio\18\BuildTools\MSBuild\Current\Bin\MSBuild.exe" SampleDotNetFrameworkApp.slnx /t:Rebuild /p:RunCodeAnalysis=true

      # ------------------------
      # 4️⃣ Setup OWASP Dependency-Check (cached)
      # ------------------------
      - name: Cache Dependency-Check
        uses: actions/cache@v3
        id: dc-cache
        with:
          path: C:\dependency-check
          key: dependency-check-v8.0.2

      - name: Download Dependency-Check if missing
        if: steps.dc-cache.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          $dcVersion = "8.0.2"
          $dcUrl = "https://github.com/jeremylong/DependencyCheck/releases/download/v$dcVersion/dependency-check-$dcVersion-release.zip"
          $dest = "C:\dependency-check.zip"
          Invoke-WebRequest -Uri $dcUrl -OutFile $dest
          Expand-Archive -Path $dest -DestinationPath "C:\dependency-check" -Force
          Remove-Item $dest
          $env:PATH += ";C:\dependency-check"

      # ------------------------
      # 5️⃣ Run Dependency-Check
      # ------------------------
      - name: Run Dependency-Check
        shell: powershell
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          C:\dependency-check\dependency-check.bat --project "SampleDotNetFrameworkApp" `
                                                    --scan "$GITHUB_WORKSPACE\bin" `
                                                    --format HTML `
                                                    --out "$GITHUB_WORKSPACE\dependency-check-report.html"

      # ------------------------
      # 6️⃣ Upload Dependency-Check Report
      # ------------------------
      - name: Upload Dependency-Check Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: dependency-check-report.html

      # ------------------------
      # 7️⃣ Upload Build Artifacts
      # ------------------------
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: SampleDotNetFrameworkApp\bin\
